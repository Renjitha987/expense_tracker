<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>
    <h1>Expense Tracker</h1>

    <form method="POST" action="/add">
        <input type="text" name="title" placeholder="Expense name">
        <input type="number" step="0.01" name="amount" placeholder="Amount">
        <button type="submit">Add</button>
    </form>

    <h3>Total: ₹ {{ total }}</h3>

    <ul>
        {% for exp in expenses %}
        <li>
            {{ exp[1] }} - ₹{{ exp[2] }}
            <a href="/delete/{{ exp[0] }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
